<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodefy - Sign Up</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* --- 1. CORE VARIABLES & THEME --- */
        :root {
            --bg-gradient-start: #050505;
            --bg-gradient-end: #1a0b2e;
            --accent-color: #8b5cf6;      
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.4);
            
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --text-dark: #52525B;
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-blur: blur(16px);
            
            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: var(--font-ui);
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- 2. BACKGROUND ANIMATIONS --- */
        
        /* Main ambient glow */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.12), transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(139, 92, 246, 0.1), transparent 40%);
            z-index: -2;
            pointer-events: none;
            transition: transform 0.1s ease-out; /* For parallax */
            animation: pulseGlow 12s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(1); filter: blur(0px); }
            50% { opacity: 0.8; transform: scale(1.02); filter: blur(2px); }
            100% { opacity: 0.5; transform: scale(1); filter: blur(0px); }
        }

        /* Animated gradient mesh overlay */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -2;
            pointer-events: none;
            animation: meshMove 20s linear infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.3; }
            100% { transform: translate(-10px, -10px) rotate(0.5deg); opacity: 0.7; }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.1s ease-out; /* For parallax */
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            box-shadow: 0 0 15px 2px rgba(139, 92, 246, 0.2);
            animation: floatParticle 18s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-120px) translateX(40px) scale(1.5); opacity: 0.6; }
            100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
        }

        /* Floating Bubbles (Large Soft Orbs) */
        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.2s ease-out; /* Slower parallax for depth */
        }

        .bubble {
            position: absolute;
            bottom: -100px; /* Start below screen */
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.08), rgba(139, 92, 246, 0.01) 60%, transparent 80%);
            border-radius: 50%;
            border: 1px solid rgba(139, 92, 246, 0.05);
            animation: riseBubble 25s infinite ease-in;
            filter: blur(2px);
        }

        @keyframes riseBubble {
            0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-120vh) translateX(50px) scale(1.2); opacity: 0; }
        }

        /* Additional floating glow spots */
        .glow-spot {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05), transparent 70%);
            border-radius: 50%;
            z-index: -2;
            pointer-events: none;
            animation: spotMove 25s infinite alternate;
            transition: transform 0.2s ease-out; /* Parallax */
        }
        .spot1 { top: -20vh; right: -10vw; }
        .spot2 { bottom: -30vh; left: -10vw; animation-delay: -5s; width: 80vw; height: 80vw; background: radial-gradient(circle at center, rgba(59, 130, 246, 0.04), transparent 70%); }
        
        @keyframes spotMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* --- 3. NAVIGATION --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            height: 64px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            display: flex;
            justify-content: space-between; /* This ensures Logo is Left and Links are Right */
            align-items: center;
            padding: 0 32px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo span { color: var(--accent-color); }

        .nav-links {
            display: flex;
            gap: 32px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s;
        }
        .nav-links a:hover { color: var(--text-main); }
        .nav-links a:hover::after { width: 100%; }

        /* --- 4. AUTH CONTAINER & CARD --- */
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px;
            position: relative;
            z-index: 10;
        }

        .auth-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-subtle);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
            opacity: 0;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .auth-header h2 {
            font-size: 2rem; margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .auth-header p {
            color: var(--text-muted); font-size: 0.95rem;
        }

        /* --- 5. FORM ELEMENTS --- */
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.3s;
            z-index: 2;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 14px 16px 14px 48px; /* Left padding for icon */
            color: white;
            font-size: 1rem;
            font-family: var(--font-ui);
            transition: all 0.3s ease;
            outline: none;
        }

        /* Adjust padding for password field to accommodate eye icon */
        .input-wrapper.has-toggle .form-input {
            padding-right: 48px; 
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Focus State */
        .form-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
            background: rgba(0, 0, 0, 0.5);
        }
        
        /* Select icon color when input focuses via general sibling selector or JS */
        .input-wrapper:focus-within .input-icon {
            color: var(--accent-color);
        }

        .form-hint {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 6px;
            text-align: right;
            font-family: var(--font-ui);
        }

        /* Button Style */
        .btn {
            padding: 14px 32px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            border: none;
            width: 100%;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
            margin-top: 10px;
        }
        
        .btn-primary::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
            z-index: -1;
        }
        .btn-primary:hover::before { left: 150%; }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: var(--accent-hover);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .auth-footer {
            margin-top: 32px;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
            padding-top: 24px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            transition: text-shadow 0.2s;
        }
        .auth-footer a:hover {
            text-shadow: 0 0 8px rgba(139, 92, 246, 0.6);
        }

        /* Password Toggle Button */
        .password-toggle {
            position: absolute;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s ease;
            z-index: 5;
        }

        .password-toggle:hover {
            color: var(--text-main);
        }

        .password-toggle svg {
            width: 20px;
            height: 20px;
            stroke-width: 2;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- 6. LOADING OVERLAY --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(12px);
            z-index: 2000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column;
        }
        
        .spinner {
            width: 60px; height: 60px; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, var(--accent-color) 360deg);
            position: relative; animation: rotateSpinner 1s linear infinite;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .spinner::after {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: #050505; border-radius: 50%;
        }
        @keyframes rotateSpinner { 100% { transform: rotate(360deg); } }

        /* --- 7. TOAST NOTIFICATIONS --- */
        .toast-container {
            position: fixed; bottom: 40px; right: 40px; z-index: 3000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .toast {
            background: rgba(20, 20, 25, 0.9); backdrop-filter: blur(10px);
            border-left: 4px solid var(--accent-color);
            padding: 18px 24px; border-radius: 8px; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 14px;
            border: 1px solid var(--border-subtle);
            min-width: 300px;
            position: relative;
            overflow: hidden;
        }
        .toast.error { border-left-color: #ef4444; }
        .toast.success { 
            border-left-color: #10b981; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 15px rgba(16, 185, 129, 0.2); /* Added Glow */
        }

        /* Progress Bar */
        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            width: 100%;
            animation: progressShrink 4s linear forwards;
        }
        .toast.success .toast-progress { background: #10b981; }
        .toast.error .toast-progress { background: #ef4444; }

        @keyframes progressShrink {
            from { width: 100%; }
            to { width: 0%; }
        }

        @keyframes slideInRight { 
            from { transform: translateX(50px); opacity: 0; } 
            to { transform: translateX(0); opacity: 1; } 
        }

        /* --- SVG ANIMATIONS FOR SUCCESS TOAST --- */
        .toast-icon-anim {
            width: 24px; 
            height: 24px;
            display: block;
        }
        
        /* Checkmark Circle Animation */
        .check-circle {
            fill: none;
            stroke: #10b981;
            stroke-width: 2;
            stroke-dasharray: 100;
            stroke-dashoffset: 100;
            animation: drawCircle 0.6s ease-out forwards;
            transform-origin: center;
            transform: rotate(-90deg) scale(0.8);
            opacity: 0;
        }
        
        /* Checkmark Tick Animation */
        .check-mark {
            fill: none;
            stroke: #10b981;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.4s ease-out 0.4s forwards; /* Starts after circle */
        }

        /* Keyframes */
        @keyframes drawCircle {
            to { stroke-dashoffset: 0; opacity: 1; }
        }
        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            nav { display: none; }
            .auth-card { padding: 32px 24px; }
            .toast-container { right: 20px; left: 20px; bottom: 20px; }
            .toast { width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>

    <!-- BACKGROUND LAYERS -->
    <div class="ambient-glow" id="ambient-glow"></div>
    <div class="mesh-bg"></div>
    
    <!-- Glow Spots (Parallax Targets) -->
    <div class="glow-spot spot1" id="spot1"></div>
    <div class="glow-spot spot2" id="spot2"></div>
    
    <!-- Floating Bubbles Layer -->
    <div class="bubbles-container" id="bubbles-container">
        <div class="bubble" style="left: 10%; width: 150px; height: 150px; animation-duration: 22s; animation-delay: 0s;"></div>
        <div class="bubble" style="left: 30%; width: 80px; height: 80px; animation-duration: 28s; animation-delay: -5s;"></div>
        <div class="bubble" style="left: 60%; width: 200px; height: 200px; animation-duration: 35s; animation-delay: -10s;"></div>
        <div class="bubble" style="left: 85%; width: 120px; height: 120px; animation-duration: 25s; animation-delay: -2s;"></div>
        <div class="bubble" style="left: 45%; width: 60px; height: 60px; animation-duration: 30s; animation-delay: -15s;"></div>
    </div>

    <!-- Particles Layer -->
    <div class="particles" id="particles">
        <div class="particle" style="top: 20%; left: 15%; animation-duration: 16s;"></div>
        <div class="particle" style="top: 70%; left: 80%; width: 6px; height: 6px; animation-duration: 22s; animation-delay: -2s;"></div>
        <div class="particle" style="top: 40%; left: 40%; width: 3px; height: 3px; animation-duration: 14s; animation-delay: -5s;"></div>
        <div class="particle" style="top: 85%; left: 25%; width: 5px; height: 5px; animation-duration: 19s; animation-delay: -1s;"></div>
        <div class="particle" style="top: 10%; left: 90%; width: 4px; height: 4px; animation-duration: 24s;"></div>
        <div class="particle" style="top: 55%; left: 10%; width: 7px; height: 7px; animation-duration: 17s; animation-delay: -8s;"></div>
        
        <!-- Extra Particles -->
        <div class="particle" style="top: 30%; left: 5%; width: 2px; height: 2px; animation-duration: 12s; animation-delay: -4s;"></div>
        <div class="particle" style="top: 60%; left: 50%; width: 5px; height: 5px; animation-duration: 20s; animation-delay: -12s;"></div>
        <div class="particle" style="top: 15%; left: 70%; width: 3px; height: 3px; animation-duration: 15s; animation-delay: -6s;"></div>
    </div>

    <!-- Navigation -->
    <nav>
        <a href="/" class="nav-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="var(--accent-color)"/>
                <path d="M2 17L12 22L22 17" stroke="white"/>
                <path d="M2 12L12 17L22 12" stroke="white"/>
            </svg>
            Nodefy
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/loginpage">Login</a>
        </div>
    </nav>

    <!-- Auth Container -->
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join Nodefy and manage your cloud nodes.</p>
            </div>

            <form id="signupForm">
                <!-- Username Input with Icon -->
                <div class="input-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrapper">
                        <!-- User Icon -->
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <!-- Name matches r.FormValue("username") -->
                        <input type="text" name="username" class="form-input" placeholder="Enter username" required maxlength="12" autocomplete="username">
                    </div>
                    <div class="form-hint">Max 12 characters</div>
                </div>

                <!-- Email Input with Icon -->
                <div class="input-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <!-- Mail Icon -->
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <!-- Name matches r.FormValue("email") -->
                        <input type="email" name="email" class="form-input" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <!-- Password Input with Icon & Toggle -->
                <div class="input-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrapper has-toggle">
                        <!-- Lock Icon -->
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        <!-- Name matches r.FormValue("password") -->
                        <input type="password" name="password" id="passwordInput" class="form-input" placeholder="••••••••" required autocomplete="new-password">
                        
                        <!-- Password Toggle Button -->
                        <button type="button" class="password-toggle" id="togglePassword" aria-label="Show password">
                            <!-- Eye Icon (Default) -->
                            <svg id="eyeIcon" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <!-- Eye Off Icon (Hidden by default via JS logic) -->
                        </button>
                    </div>
                    <div class="form-hint">Must contain uppercase, number, and special char</div>
                </div>

                <button type="submit" class="btn btn-primary">
                    Sign Up
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/loginpage">Login</a>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <h3 style="font-weight: 600; margin-top: 24px;">Creating Account...</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">Please wait while we verify your details.</p>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. MOUSE PARALLAX EFFECT ---
            const ambientGlow = document.getElementById('ambient-glow');
            const spot1 = document.getElementById('spot1');
            const spot2 = document.getElementById('spot2');
            const particles = document.getElementById('particles');
            const bubblesContainer = document.getElementById('bubbles-container');

            document.addEventListener('mousemove', (e) => {
                const x = (window.innerWidth - e.pageX * 2) / 100;
                const y = (window.innerHeight - e.pageY * 2) / 100;

                // Move layers at different speeds for depth
                if(ambientGlow) ambientGlow.style.transform = `translate(${x}px, ${y}px)`;
                if(spot1) spot1.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
                if(spot2) spot2.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
                if(particles) particles.style.transform = `translate(${x * -0.5}px, ${y * -0.5}px)`;
                if(bubblesContainer) bubblesContainer.style.transform = `translate(${x * -0.2}px, ${y * -0.2}px)`;
            });

            // --- 2. PASSWORD VISIBILITY TOGGLE ---
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('passwordInput');
            
            togglePassword.addEventListener('click', function () {
                // Toggle type attribute
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Toggle Icon
                if (type === 'text') {
                    // Show Eye Off Icon
                    this.innerHTML = `
                        <svg viewBox="0 0 24 24">
                            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M1 1l22 22"></path>
                            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
                        </svg>
                    `;
                    this.setAttribute('aria-label', 'Hide password');
                } else {
                    // Show Eye Icon
                    this.innerHTML = `
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    `;
                    this.setAttribute('aria-label', 'Show password');
                }
            });

            // --- 3. SIGNUP LOGIC ---
            const signupForm = document.getElementById('signupForm');
            const overlay = document.getElementById('loading-overlay');

            signupForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                overlay.style.display = 'flex';

                // Collect form data
                const formData = new FormData(signupForm);

                try {
                    const response = await fetch('/signup', {
                        method: 'POST',
                        body: formData // Sends as multipart/form-data
                    });

                    let message = "";
                    
                    // Attempt to parse JSON, but fallback to text if backend returns plain string
                    try {
                        const data = await response.json();
                        message = data.message;
                    } catch (err) {
                        // Fallback if response is not JSON
                        message = await response.text();
                    }

                    if (response.ok) {
                        // Success (200)
                        showToast(message || "Signup Successful!", "success");
                        
                        // Redirect to OTP Verification Page
                        setTimeout(() => {
                            window.location.href = '/otpverificationpage'; 
                        }, 2000);
                    } else {
                        // Handle Errors based on Go Backend Status Codes
                        
                        if (response.status === 402) {
                            // Go: ErrAuthenticate ("Signup Failed" - validation)
                            showToast(message || "Invalid input details.", "error");
                        } else if (response.status === 500) {
                            // Go: ErrInternalserver
                            showToast(message || "Internal Server Error", "error");
                        } else if (response.status === 405) {
                            // Go: Invalid Method
                            showToast(message || "Method not allowed.", "error");
                        } else if (response.status === 409) {
                            // Common Conflict (User exists)
                            showToast(message || "User already exists.", "error");
                        } else {
                            showToast(message || "Something went wrong.", "error");
                        }
                    }

                } catch (error) {
                    console.error("Signup Error:", error);
                    showToast("Network error. Please try again.", "error");
                } finally {
                    overlay.style.display = 'none';
                }
            });
        });

        // --- 4. TOAST NOTIFICATION SYSTEM (UPDATED WITH ANIMATION) ---
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';

            if (type === 'success') {
                // Professional Animated SVG
                icon = `
                    <svg class="toast-icon-anim" viewBox="0 0 24 24">
                        <circle class="check-circle" cx="12" cy="12" r="9"></circle>
                        <polyline class="check-mark" points="9 12 11.5 14.5 16 9"></polyline>
                    </svg>
                `;
            } else {
                // Standard Error Icon
                icon = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                `;
            }

            // Add icon, message, and progress bar
            toast.innerHTML = `
                <div style="display:flex; align-items:center; gap:14px; width:100%;">
                    ${icon}
                    <span style="font-weight:500;">${message}</span>
                </div>
                <div class="toast-progress"></div>
            `;
            
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }
    </script>
</body>
</html>
