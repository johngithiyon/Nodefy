<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nodefy - Explore OS</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* --- 1. CORE VARIABLES & THEME --- */
        :root {
            --bg-gradient-start: #050505;
            --bg-gradient-end: #1a0b2e;
            --accent-color: #8b5cf6;      
            --accent-hover: #7c3aed;
            --accent-glow: rgba(139, 92, 246, 0.4);
            
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --text-dark: #52525B;
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.2);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-blur: blur(16px);
            
            --font-ui: 'Inter', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-ui);
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ---------- BACKGROUND ANIMATIONS ---------- */
        .ambient-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.12), transparent 35%),
                radial-gradient(circle at 40% 80%, rgba(139, 92, 246, 0.1), transparent 40%);
            z-index: -2;
            pointer-events: none;
            transition: transform 0.1s ease-out;
            animation: pulseGlow 12s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(1); filter: blur(0px); }
            50% { opacity: 0.8; transform: scale(1.02); filter: blur(2px); }
            100% { opacity: 0.5; transform: scale(1); filter: blur(0px); }
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: 
                linear-gradient(rgba(139, 92, 246, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 92, 246, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: -2;
            pointer-events: none;
            animation: meshMove 20s linear infinite alternate;
        }

        @keyframes meshMove {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.3; }
            100% { transform: translate(-10px, -10px) rotate(0.5deg); opacity: 0.7; }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.1s ease-out;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            box-shadow: 0 0 15px 2px rgba(139, 92, 246, 0.2);
            animation: floatParticle 18s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
            50% { transform: translateY(-120px) translateX(40px) scale(1.5); opacity: 0.6; }
            100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.2; }
        }

        .bubbles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
            transition: transform 0.2s ease-out;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: radial-gradient(circle at 30% 30%, rgba(139, 92, 246, 0.08), rgba(139, 92, 246, 0.01) 60%, transparent 80%);
            border-radius: 50%;
            border: 1px solid rgba(139, 92, 246, 0.05);
            animation: riseBubble 25s infinite ease-in;
            filter: blur(2px);
        }

        @keyframes riseBubble {
            0% { transform: translateY(0) translateX(0) scale(0.8); opacity: 0; }
            20% { opacity: 0.5; }
            80% { opacity: 0.5; }
            100% { transform: translateY(-120vh) translateX(50px) scale(1.2); opacity: 0; }
        }

        .glow-spot {
            position: fixed;
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle at center, rgba(139, 92, 246, 0.05), transparent 70%);
            border-radius: 50%;
            z-index: -2;
            pointer-events: none;
            animation: spotMove 25s infinite alternate;
            transition: transform 0.2s ease-out;
        }
        .spot1 { top: -20vh; right: -10vw; }
        .spot2 { bottom: -30vh; left: -10vw; animation-delay: -5s; width: 80vw; height: 80vw; background: radial-gradient(circle at center, rgba(59, 130, 246, 0.04), transparent 70%); }
        
        @keyframes spotMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            height: 64px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .nav-logo {
            font-weight: 800;
            font-size: 1.25rem;
            letter-spacing: -0.02em;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-logo span { color: var(--accent-color); }

        .nav-links {
            display: flex;
            gap: 32px;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s;
        }
        .nav-links a:hover { color: var(--text-main); }
        .nav-links a:hover::after { width: 100%; }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1;
            padding-top: 130px;
            padding-bottom: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            width: 100%;
        }

        .wizard-container {
            width: 90%;
            max-width: 1000px;
            position: relative;
        }

        .step-header {
            text-align: center;
            margin-bottom: 40px;
            animation: floatDown 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        @keyframes floatDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        .step-header h2 {
            font-size: 2.5rem; margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800; letter-spacing: -1px;
        }
        .step-header p {
            font-size: 1.1rem; color: var(--text-muted);
            max-width: 600px; margin: 0 auto;
        }

        /* --- GRID SYSTEMS --- */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            perspective: 1000px;
        }

        /* --- OS CARD STYLES --- */
        .os-card {
            background: rgba(20, 20, 25, 0.4);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            padding: 32px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
            height: 240px;
            z-index: 10;
        }

        .os-card::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
            transition: 0.5s; pointer-events: none;
        }
        .os-card:hover::before { left: 100%; }

        .os-card:hover {
            border-color: rgba(139, 92, 246, 0.4);
            background: rgba(30, 30, 40, 0.6);
            transform: translateY(-8px);
            box-shadow: 0 15px 40px -10px rgba(0,0,0,0.6), 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .os-icon-box {
            width: 90px; height: 90px;
            margin-bottom: 24px;
            display: flex; align-items: center; justify-content: center;
            background: transparent;
            border: none;
            border-radius: 0;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .os-icon-box img {
            max-width: 70%; max-height: 70%;
            object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            transition: transform 0.3s ease;
        }
        
        .os-name { 
            font-size: 1.2rem; font-weight: 600; color: var(--text-main);
            z-index: 2; letter-spacing: 0.5px;
        }

        .os-card.selected {
            border-color: var(--accent-color);
            background: linear-gradient(145deg, rgba(139, 92, 246, 0.15), rgba(20, 20, 25, 0.8));
            box-shadow: 0 0 0 1px var(--accent-color), 0 0 30px rgba(139, 92, 246, 0.2);
            transform: translateY(-5px);
        }

        /* --- FORM STYLES --- */
        .config-form {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(20, 20, 25, 0.4);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid var(--border-subtle);
            text-align: center;
            display: none;
            animation: expandFade 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-subtle);
            color: white;
            padding: 12px 16px;
            border-radius: 8px;
            font-family: var(--font-code);
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .form-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }

        /* --- BUTTONS --- */
        .actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .btn {
            padding: 14px 32px; border-radius: 8px; font-weight: 600;
            font-size: 1rem; cursor: pointer; transition: all 0.3s;
            border: none; display: inline-flex; align-items: center; gap: 8px;
            letter-spacing: 0.5px;
            position: relative; overflow: hidden;
        }

        .btn-primary {
            background: var(--accent-color); color: white;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
            z-index: 1;
        }
        
        .btn-primary::before {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
            z-index: -1;
        }
        .btn-primary:hover::before { left: 150%; transition: 0.7s; }

        .btn-primary:hover {
            transform: translateY(-3px);
            background: var(--accent-hover);
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.05); color: white;
            border: 1px solid var(--border-subtle);
        }
        .btn-secondary:hover { 
            background: rgba(255,255,255,0.1); 
            border-color: var(--border-hover);
        }

        /* --- STEPS & TRANSITIONS --- */
        .wizard-step { display: none; }
        .wizard-step.active { display: block; animation: stepReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes stepReveal {
            from { opacity: 0; transform: translateY(15px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes expandFade {
            from { opacity: 0; transform: translateY(10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- OVERLAYS & TOASTS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(12px);
            z-index: 2000;
            display: none; align-items: center; justify-content: center;
            flex-direction: column;
        }
        
        .spinner {
            width: 60px; height: 60px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0deg, var(--accent-color) 360deg);
            position: relative;
            animation: rotateSpinner 1s linear infinite;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .spinner::after {
            content: ''; position: absolute; top: 4px; left: 4px; right: 4px; bottom: 4px;
            background: #050505; border-radius: 50%;
        }
        @keyframes rotateSpinner { 100% { transform: rotate(360deg); } }

        .toast-container {
            position: fixed; bottom: 40px; right: 40px; z-index: 3000;
            display: flex; flex-direction: column; gap: 12px;
        }
        .toast {
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--accent-color);
            padding: 18px 24px; border-radius: 8px; color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; align-items: center; gap: 14px;
            border: 1px solid var(--border-subtle);
            min-width: 300px;
        }
        .toast.error { border-left-color: #ef4444; }
        .toast.success { border-left-color: #10b981; }

        @keyframes slideInRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Responsive */
        @media (max-width: 768px) {
            .step-header h2 { font-size: 2rem; }
            .nav-links a { display: none; }
        }
    </style>
</head>
<body>

    <!-- Backgrounds -->
    <div class="ambient-glow" id="ambient-glow"></div>
    <div class="mesh-bg"></div>
    <div class="glow-spot spot1" id="spot1"></div>
    <div class="glow-spot spot2" id="spot2"></div>
    <div class="bubbles-container" id="bubbles-container">
        <div class="bubble" style="left: 10%; width: 150px; height: 150px; animation-duration: 22s; animation-delay: 0s;"></div>
        <div class="bubble" style="left: 30%; width: 80px; height: 80px; animation-duration: 28s; animation-delay: -5s;"></div>
        <div class="bubble" style="left: 60%; width: 200px; height: 200px; animation-duration: 35s; animation-delay: -10s;"></div>
    </div>
    <div class="particles" id="particles">
        <div class="particle" style="top: 20%; left: 15%; animation-duration: 16s;"></div>
        <div class="particle" style="top: 70%; left: 80%; width: 6px; height: 6px; animation-duration: 22s; animation-delay: -2s;"></div>
        <div class="particle" style="top: 40%; left: 40%; width: 3px; height: 3px; animation-duration: 14s; animation-delay: -5s;"></div>
    </div>

    <!-- Navigation -->
    <nav>
        <a href="/" class="nav-logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="var(--accent-color)"/>
                <path d="M2 17L12 22L22 17" stroke="white"/>
                <path d="M2 12L12 17L22 12" stroke="white"/>
            </svg>
            Nodefy
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/aboutpage">About</a>
        </div>
    </nav>

    <main>
        <div class="wizard-container">
            
            <!-- STEP 1: SELECT OS -->
            <div id="step-1" class="wizard-step active">
                <div class="step-header">
                    <h2>Choose OS to Explore</h2>
                    <p>Select a system to start learning commands</p>
                </div>

                <div class="selection-grid">
                    <!-- Ubuntu -->
                    <div class="os-card" onclick="selectOS('ubuntu')">
                        <div class="os-icon-box">
                            <img src="/static/images/ubuntu.png" alt="Ubuntu">
                        </div>
                        <div class="os-name">Ubuntu</div>
                    </div>

                    <!-- Alpine -->
                    <div class="os-card" onclick="selectOS('alpine')">
                        <div class="os-icon-box">
                            <img src="static/images/alpine.webp" alt="Alpine">
                        </div>
                        <div class="os-name">Alpine</div>
                    </div>

                    <!-- Fedora -->
                    <div class="os-card" onclick="selectOS('fedora')">
                        <div class="os-icon-box">
                            <img src="static/images/fedora.webp" alt="Fedora">
                        </div>
                        <div class="os-name">Fedora</div>
                    </div>

                    <!-- CentOS -->
                    <div class="os-card" onclick="selectOS('quay.io/centos/centos:stream9')">
                        <div class="os-icon-box">
                            <img src="static/images/CentOS.png" alt="CentOS">
                        </div>
                        <div class="os-name">CentOS</div>
                    </div>

                    <!-- Kali -->
                    <div class="os-card" onclick="selectOS('kalilinux/kali-rolling')">
                        <div class="os-icon-box">
                            <img src="static/images/Kali.png" alt="Kali Linux">
                        </div>
                        <div class="os-name">Kali Linux</div>
                    </div>
                </div>
            </div>

            <!-- STEP 2: INSTANCE CONFIGURATION -->
            <div id="step-2" class="wizard-step">
                <div class="step-header">
                    <h2>Instance Details</h2>
                    <p>Name your exploration session</p>
                </div>

                <div class="config-form" style="display: block;">
                    <div class="form-group">
                        <label class="form-label">Instance Name</label>
                        <input type="text" id="instance-name" class="form-input" placeholder="e.g. myubuntulab">
                    </div>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="goToStep(1)">Back</button>
                        <button class="btn btn-primary" onclick="initiateExploration()">Start Exploration</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Loading Overlay -->
    <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <h3 style="font-weight: 600; margin-top: 24px;">Initializing Environment...</h3>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 8px;">Configuring OS & Preparing Lessons</p>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- PARALLAX BACKGROUND EFFECT ---
            const ambientGlow = document.getElementById('ambient-glow');
            const spot1 = document.getElementById('spot1');
            const spot2 = document.getElementById('spot2');
            const particles = document.getElementById('particles');
            const bubblesContainer = document.getElementById('bubbles-container');

            if(ambientGlow || spot1 || spot2 || particles || bubblesContainer) {
                document.addEventListener('mousemove', (e) => {
                    const x = (window.innerWidth - e.pageX * 2) / 100;
                    const y = (window.innerHeight - e.pageY * 2) / 100;

                    if(ambientGlow) ambientGlow.style.transform = `translate(${x}px, ${y}px)`;
                    if(spot1) spot1.style.transform = `translate(${x * 1.5}px, ${y * 1.5}px)`;
                    if(spot2) spot2.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
                    if(particles) particles.style.transform = `translate(${x * -0.5}px, ${y * -0.5}px)`;
                    if(bubblesContainer) bubblesContainer.style.transform = `translate(${x * -0.2}px, ${y * -0.2}px)`;
                });
            }
        });

        let selectedOS = "";

        /* --- OS SELECTION --- */
        function selectOS(osName) {
            selectedOS = osName;
            localStorage.setItem('selectedOS', osName);
            
            // Visual feedback
            document.querySelectorAll('.os-card').forEach(card => {
                card.classList.remove('selected');
                card.style.borderColor = 'var(--border-subtle)';
                card.style.background = 'rgba(20, 20, 25, 0.4)';
            });
            
            const activeCard = event.currentTarget;
            activeCard.classList.add('selected');
            activeCard.style.borderColor = 'var(--accent-color)';

            // Move to Step 2
            goToStep(2);
        }

        /* --- NAVIGATION LOGIC --- */
        function goToStep(stepNumber) {
            document.querySelectorAll('.wizard-step').forEach(el => {
                el.classList.remove('active');
            });
            const target = document.getElementById(`step-${stepNumber}`);
            if (target) target.classList.add('active');
        }

        /* --- API CALL & INITIALIZATION --- */
        async function initiateExploration() {
            const instancename = document.getElementById('instance-name').value.trim();

            if (!selectedOS) {
                showToast("Please select an OS first.", "error");
                goToStep(1);
                return;
            }

            if (!instancename) {
                showToast("Please enter an Instance Name.", "error");
                return;
            }

            // --- VALIDATION LOGIC ---
            // Regex: Allows only lowercase letters (a-z) and numbers (0-9).
            // Blocks spaces, underscores, special characters, and uppercase letters.
            const validNameRegex = /^[a-z0-9]+$/;

            if (!validNameRegex.test(instancename)) {
                showToast("Instance name can only contain lowercase letters and numbers (no spaces, underscores, or special characters).", "error");
                return;
            }

            localStorage.setItem('selectedOS', selectedOS);
            localStorage.setItem('instanceName', instancename);

            const payload = {
                osname: selectedOS,
                instancename: instancename
            };

            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';

            try {
                // Call the Go Backend: /exploreos
                const response = await fetch('/exploreos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include', // Send session-id cookie
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    showToast(data.message || "Environment Ready!", "success");
                    
                    // Redirect to teaching page
                    window.location.href = '/teachpage';
                } else {
                    if (response.status === 400 && data.message === "Cookie not found") {
                        showToast("Session expired. Please login.", "error");
                        setTimeout(() => window.location.href = 'login.html', 2000);
                    } else {
                        showToast(data.message || "Initialization Failed", "error");
                    }
                }
            } catch (error) {
                console.error(error);
                showToast("Network Error", "error");
            } finally {
                overlay.style.display = 'none';
            }
        }

        /* --- TOAST NOTIFICATIONS --- */
        function showToast(message, type = "success") {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            let icon = '';
            if(type === 'success') icon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            else icon = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';

            toast.innerHTML = `${icon}<span>${message}</span>`;
            container.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideInRight 0.3s ease reverse forwards';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
